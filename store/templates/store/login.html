<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JAVSTAY – Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { width: 380px; border-radius: 16px; border: none; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .form-control { border-radius: 8px; padding: 10px 14px; }
    .btn-login { border-radius: 8px; padding: 10px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card login-card p-4">
    <div class="text-center mb-4">
      <div style="font-size:2.5rem; color:#0d6efd;"><i class="bi bi-shop"></i></div>
      <h4 class="fw-bold mt-2">JAVSTAY</h4>
      <p class="text-muted small">Sign in to your account</p>
    </div>
    {% if form.errors %}
      <div class="alert alert-danger small">Invalid username or password. Please try again.</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
        <div class="mb-3">
          <label class="form-label fw-500">{{ field.label }}</label>
          <input type="{{ field.field.widget.input_type }}"
                 name="{{ field.html_name }}"
                 class="form-control"
                 placeholder="{{ field.label }}"
                 {% if field.value %}value="{{ field.value }}"{% endif %}>
        </div>
      {% endfor %}
      <button type="submit" class="btn btn-primary w-100 btn-login mt-2">
        <i class="bi bi-box-arrow-in-right me-2"></i>Login
      </button>
    </form>
    <hr>
<p class="text-center text-muted small mb-0">
  New here? <a href="{% url 'register' %}">Create an account</a>
</p>
  </div>
</body>
</html>
