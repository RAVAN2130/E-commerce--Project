{% extends 'store/base.html' %}
{% block content %}
<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Purchase Orders</h2>
    <a href="{% url 'purchase_create' %}" class="btn btn-primary">+ New Order</a>
  </div>
  <table class="table table-striped">
    <thead>
      <tr><th>PO #</th><th>Supplier</th><th>Date</th><th>Status</th><th>Total</th></tr>
    </thead>
    <tbody>
      {% for o in orders %}
      <tr>
        <td>PO-{{ o.id }}</td>
        <td>{{ o.supplier }}</td>
        <td>{{ o.order_date|date:"d M Y" }}</td>
        <td>{{ o.status }}</td>
        <td>{{ o.total_amount }}</td>
      </tr>
      {% empty %}
      <tr><td colspan="5">No purchase orders yet.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
