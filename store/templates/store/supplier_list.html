{% extends 'store/base.html' %}
{% block content %}
<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Suppliers</h2>
    <a href="{% url 'supplier_create' %}" class="btn btn-primary">+ Add Supplier</a>
  </div>
  <table class="table table-striped">
    <thead>
      <tr><th>Name</th><th>Email</th><th>Phone</th><th>Address</th></tr>
    </thead>
    <tbody>
      {% for s in suppliers %}
      <tr>
        <td>{{ s.name }}</td>
        <td>{{ s.email }}</td>
        <td>{{ s.phone }}</td>
        <td>{{ s.address }}</td>
      </tr>
      {% empty %}
      <tr><td colspan="4">No suppliers yet.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
